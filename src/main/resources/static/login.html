<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎回来 - 用户登录</title>
    <style>
        /* 全局风格对齐 register.html */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* 登录卡片容器 */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: #4a5568;
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* 表单布局 */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        input[type=text], input[type=password] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 登录按钮 */
        button {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            opacity: 0.95;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 注册引导链接 */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* 状态消息框 */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background-color: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .error { background-color: #fed7d7; color: #822727; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="container">
    <h2>欢迎回来</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名或邮箱</label>
            <input type="text" id="username" placeholder="请输入您的账号" name="usernameOrEmail" required>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入您的密码" name="password" required>
        </div>

        <button type="submit">立即登录</button>
    </form>

    <div class="footer-links">
        还没有账号？<a href="register.html">立即注册</a>
    </div>

    <div id="responseMessage" class="message"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const form = event.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const messageDiv = document.getElementById('responseMessage');
        messageDiv.style.display = 'block';
        messageDiv.className = 'message';
        messageDiv.textContent = '⏳ 正在验证身份，请稍候...';

        fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errorData => {
                        throw new Error(errorData.message || response.statusText || '登录失败');
                    }).catch(() => {
                        throw new Error(`请求失败，状态码: ${response.status}`);
                    });
                }
                return response.json();
            })
            .then(responseData => {
                // 验证后端返回的 Token
                if (!responseData.accessToken) {
                    throw new Error("后端未返回有效的访问令牌");
                }

                messageDiv.className = 'message success';
                messageDiv.textContent = '✅ 登录成功！正在进入系统...';

                // 持久化存储用户凭证
                localStorage.setItem('blogToken', responseData.accessToken);
                localStorage.setItem('blogUsername', responseData.username || 'unknown');

                // 关键点：存储权限角色数组字符串
                const roles = responseData.roles || [];
                localStorage.setItem('blogRoles', JSON.stringify(roles));

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(error => {
                console.error('登录异常:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ 登录失败: ' + error.message;
            });
    });
</script>

</body>
</html>
