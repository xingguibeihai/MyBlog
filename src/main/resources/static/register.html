<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入我们 - 用户注册</title>
    <style>
        /* 全局样式优化 */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* 注册卡片容器 */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: #4a5568;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* 表单元素优化 */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        input[type=text], input[type=password], input[type=email] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 按钮优化 */
        button {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.3s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 底部链接 */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* 消息提示框 */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background-color: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .error { background-color: #fed7d7; color: #822727; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="container">
    <h2>创建新账号</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="建议使用字母数字组合" name="username" required>
        </div>

        <div class="form-group">
            <label for="name">昵称</label>
            <input type="text" id="name" placeholder="显示在文章中的名称" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">邮箱地址</label>
            <input type="email" id="email" placeholder="example@mail.com" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入 6 位及以上密码" name="password" required>
        </div>

        <button type="submit">立即注册</button>
    </form>

    <div class="footer-links">
        已有账号？<a href="login.html">直接登录</a>
    </div>

    <div id="responseMessage" class="message"></div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const form = event.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const messageDiv = document.getElementById('responseMessage');
        messageDiv.style.display = 'block';
        messageDiv.className = 'message';
        messageDiv.textContent = '⏳ 正在提交，请稍候...';

        fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => {
                if (response.ok) {
                    return response.text();
                } else {
                    return response.text().then(text => { throw new Error(text || '注册失败'); });
                }
            })
            .then(responseText => {
                messageDiv.className = 'message success';
                messageDiv.textContent = '🎉 注册成功！正在为您跳转到登录页面...';
                form.reset();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            })
            .catch(error => {
                console.error('注册错误:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ 注册失败: ' + error.message;
            });
    });
</script>

</body>
</html>
