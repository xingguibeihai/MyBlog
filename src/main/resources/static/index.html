<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客 - 发现精彩世界</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            /* 现代色彩搭配 */
            --primary: #6366f1; /* 靛蓝 */
            --secondary: #ec4899; /* 粉紫 */
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            /* 更有层次感的阴影 */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            /* 圆角规范 */
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航栏 - 毛玻璃效果进阶 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 10%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        #logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .auth-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            margin-left: 20px;
            font-size: 15px;
            transition: color 0.3s;
        }

        .auth-links a:hover {
            color: var(--primary);
        }

        .user-info-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            color: var(--danger) !important;
            font-size: 14px;
            background: #fef2f2;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        /* 主体布局 */
        .main-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 表单与卡片基础样式 */
        .surface-card {
            background: var(--surface);
            padding: 35px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 发布文章区特别样式 */
        .create-post-section h3 {
            margin-top: 0;
            color: var(--text-dark);
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 优雅的输入框 */
        input[type="text"], textarea {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 18px;
            background-color: #f1f5f9;
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            background-color: var(--surface);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        /* 媒体上传条 */
        .media-upload-section {
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 2px dashed var(--border-light);
            margin-bottom: 24px;
            transition: border-color 0.3s;
        }

        .media-upload-section:hover {
            border-color: #cbd5e1;
        }

        .upload-controls { display: flex; gap: 12px; align-items: center; }

        /* 按钮全局样式 */
        .btn-grad {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
        }

        .btn-grad:active {
            transform: translateY(0);
        }

        /* 搜索框 */
        .search-section {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }
        .search-section input { margin-bottom: 0; }

        /* 文章卡片 */
        .post-card {
            background: var(--surface);
            padding: 35px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 35px;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .post-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .post-meta {
            font-size: 14px;
            color: var(--text-light);
            margin: 12px 0 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .post-body {
            font-size: 16px;
            color: #334155;
            line-height: 1.8;
        }

        .post-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 20px 0;
            box-shadow: var(--shadow-sm);
        }

        /* Markdown 内容排版美化 */
        .post-body h1, .post-body h2, .post-body h3 {
            color: var(--text-dark);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .post-body pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        .post-body code {
            font-family: 'Courier New', Courier, monospace;
            background: #f1f5f9;
            color: #ec4899;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .post-body pre code { background: transparent; color: inherit; padding: 0; }
        .post-body blockquote {
            border-left: 4px solid var(--primary);
            margin: 0;
            padding-left: 16px;
            color: var(--text-light);
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        /* 删除按钮 */
        .del-btn-post {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .del-btn-post:hover { background: var(--danger); color: white; }

        /* 评论区美化 */
        .comments-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-light);
        }

        .comments-section h4 {
            color: var(--text-dark);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .comment-form textarea {
            margin-bottom: 12px;
        }

        .comment-card {
            background: #f8fafc;
            padding: 18px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            transition: background 0.3s;
        }
        .comment-card:hover {
            background: #f1f5f9;
        }

        .comment-meta {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .comment-meta span {
            color: var(--primary);
            font-weight: 600;
        }

        .comment-body {
            font-size: 15px;
            color: #475569;
        }

        .comment-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .comment-actions button {
            background: transparent;
            border: none;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .edit-btn { color: var(--primary); }
        .edit-btn:hover { background: #e0e7ff; }
        .delete-btn-comment { color: var(--danger); }
        .delete-btn-comment:hover { background: #fef2f2; }
        .save-btn { color: var(--success); }
        .cancel-btn { color: var(--text-light); }

        /* 分页器 */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            padding-bottom: 60px;
        }

        .pagination-btn {
            padding: 10px 22px;
            margin: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination-btn:disabled {
            color: #cbd5e0;
            background: #f8fafc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .pagination-info {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .navbar { padding: 15px 5%; }
            .main-container { margin: 20px auto; }
            .surface-card, .post-card { padding: 20px; }
            .post-title { font-size: 22px; }
            .search-section { flex-direction: column; }
            .btn-grad { width: 100%; }
        }
    </style>
</head>
<body onload="checkLoginStatus(); loadPosts(0);">

<div class="navbar">
    <div id="logo">MyBlog.</div>
    <div id="authSection" class="auth-links">
    </div>
</div>

<div class="main-container">
    <div class="surface-card create-post-section">
        <h3>✨ 记录新瞬间</h3>
        <form id="createPostForm">
            <input type="text" id="title" placeholder="给文章起一个响亮的标题..." required>
            <textarea id="body" rows="6" placeholder="支持 Markdown 语法，分享你的精彩故事..." required></textarea>

            <div id="bodyPreview" style="display: none; border: 2px solid #e0e7ff; padding: 20px; border-radius: var(--radius-md); margin-bottom: 20px; background: #fefeff;">
                <div style="color: var(--primary); font-weight: 700; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">实时预览</div>
                <div id="previewContent" class="post-body"></div>
            </div>

            <div class="media-upload-section">
                <div class="upload-controls">
                    <input type="file" id="mediaFile" accept="image/*,video/*" style="margin-bottom:0; font-size: 14px;">
                    <button type="button" onclick="uploadMedia()" class="btn-grad" style="padding: 10px 20px; font-size: 14px; box-shadow: none;">⬆️ 上传素材</button>
                </div>
                <div id="uploadStatus" style="font-size: 13px; margin-top: 10px; font-weight: 500;"></div>
            </div>

            <input type="text" id="author" readonly style="background: transparent; border: none; color: var(--text-light); font-size: 14px; padding: 0; margin-bottom: 20px; text-align: right; pointer-events: none;">
            <button type="submit" class="btn-grad" style="width: 100%;">🚀 立即发布</button>
        </form>
    </div>

    <div class="search-section">
        <input type="text" id="searchKeyword" placeholder="搜索文章标题或关键词..." style="flex: 1;">
        <button onclick="performSearch()" class="btn-grad" style="width: auto;">🔍 搜索</button>
    </div>

    <div id="postsContainer">
        <div class="loading">正在加载精彩内容...</div>
    </div>

    <div id="paginationControls" class="pagination-container"></div>
</div>

<script>
    const API_URL = '/api/content';
    const MEDIA_UPLOAD_URL = '/api/media/upload';
    let currentPage = 0;
    const pageSize = 10;
    const sortBy = 'publishedAt';
    const sortDir = 'desc';
    let currentKeyword = '';
    const currentUsername = localStorage.getItem('blogUsername');

    function escapeHtml(text) {
        if (!text) return '';
        return text.toString().replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function checkTokenAndReload(response) {
        if (response.status === 401) {
            localStorage.removeItem('blogToken');
            localStorage.removeItem('blogUsername');
            localStorage.removeItem('blogRoles');
            alert('登录已过期或无效，请重新登录。');
            window.location.href = 'login.html';

            console.error("401 Unauthorized 错误发生。Token 已过期或无效。");
            return true;
        }
        return false;
    }

    function checkLoginStatus() {
        const token = localStorage.getItem('blogToken');
        const username = localStorage.getItem('blogUsername');
        const authSection = document.getElementById('authSection');
        const authorInput = document.getElementById('author');

        if (token && username) {
            authSection.innerHTML = `
                <span class="user-info" style="font-weight: 600;">👋 ${escapeHtml(username)}</span>
                <a class="logout-btn" onclick="logout()">退出</a>
            `;
            authorInput.value = "当前作者: " + username;
        } else {
            authSection.innerHTML = `<a href="login.html">去登录</a> | <a href="register.html">注册</a>`;
            authorInput.value = "未登录状态，无法发布";
            authorInput.style.color = "var(--danger)";
        }
    }

    function logout() {
        if(confirm("确定要退出登录吗？")) {
            localStorage.removeItem('blogToken');
            localStorage.removeItem('blogUsername');
            localStorage.removeItem('blogRoles');
            window.location.reload();
        }
    }

    function loadPosts(pageNo = currentPage) {
        currentPage = pageNo;

        const storedRolesJson = localStorage.getItem('blogRoles');
        let isAdmin = false;

        if (storedRolesJson) {
            try {
                const userRoles = JSON.parse(storedRolesJson);
                isAdmin = Array.isArray(userRoles) && userRoles.includes('ROLE_ADMIN');
            } catch (e) {
                console.error("解析用户角色 JSON 失败 (loadPosts):", e);
                isAdmin = false;
            }
        }

        document.getElementById('postsContainer').innerHTML = '<div class="loading">正在加载文章...</div>';

        let fetchUrl = `${API_URL}?pageNo=${pageNo}&pageSize=${pageSize}&sortBy=${sortBy}&sortDir=${sortDir}`;
        if (currentKeyword) {
            fetchUrl += `&keyword=${encodeURIComponent(currentKeyword)}`;
        }

        fetch(fetchUrl)
            .then(response => {
                if (!response.ok) {
                    checkTokenAndReload(response);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(contentResponse => {
                const container = document.getElementById('postsContainer');
                container.innerHTML = '';

                const posts = contentResponse.content;

                if (!posts || posts.length === 0) {
                    const message = currentKeyword ?
                        `找不到包含 "${escapeHtml(currentKeyword)}" 的文章。` :
                        '暂时还没有文章，快来发布第一篇吧！';

                    container.innerHTML = `<div class="loading">${message}</div>`;
                    document.getElementById('paginationControls').innerHTML = '';
                    return;
                }

                posts.forEach(post => {
                    let deleteButton = '';

                    if (isAdmin || (currentUsername === post.author)) {
                        deleteButton = `<button
                                        onclick="deletePost(${post.id}, '${escapeHtml(post.title)}')"
                                        class="del-btn-post">
                                        🗑️ 删除
                                    </button>`;
                    }

                    const renderedBody = marked.parse(post.body || '');

                    const postDiv = document.createElement('div');
                    postDiv.className = 'post-card';
                    postDiv.id = `post-${post.id}`;
                    postDiv.innerHTML = `
                        <div class="post-title-row">
                            <div class="post-title">${escapeHtml(post.title)}</div>
                            <div>${deleteButton}</div>
                        </div>
                        <div class="post-meta">
                            <span>✍️ ${escapeHtml(post.author)}</span>
                            <span>🕒 ${new Date(post.publishedAt).toLocaleString()}</span>
                        </div>
                        <div class="post-body">${renderedBody}</div>

                        <div class="comments-section">
                            <h4 id="commentCountDisplay-${post.id}">💬 评论 (${post.commentCount || 0})</h4>

                            ${currentUsername ? `
                                <div class="comment-form">
                                    <textarea id="commentBody-${post.id}"
                                        rows="3"
                                        placeholder="发表你的看法 (支持 Markdown)..."
                                        required></textarea>
                                    <button onclick="submitComment(${post.id})" class="btn-grad" style="padding: 8px 20px; font-size: 14px;">发送评论</button>
                                </div>
                            ` : `<p style="color: var(--danger); font-size: 14px; background: #fef2f2; padding: 10px; border-radius: 8px;">请登录后发表评论。</p>`}

                            <div id="commentsContainer-${post.id}" style="margin-top: 20px;">
                                <div class="loading" style="font-size: 0.9em; padding: 10px;">正在加载评论...</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(postDiv);

                    loadComments(post.id);
                });

                renderPagination(contentResponse);
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('postsContainer').innerHTML = '<div class="loading" style="color:var(--danger)">加载失败，请检查网络或后端服务。</div>';
                document.getElementById('paginationControls').innerHTML = '';
            });
    }

    function renderPagination(response) {
        const controls = document.getElementById('paginationControls');
        controls.innerHTML = '';

        if (response.totalPages <= 1) return;

        const totalPages = response.totalPages;
        const pageNo = response.pageNo;

        controls.innerHTML += `<button class="pagination-btn" onclick="loadPosts(${pageNo - 1})" ${pageNo === 0 ? 'disabled' : ''}>上一页</button>`;
        controls.innerHTML += `<span class="pagination-info">第 ${pageNo + 1} 页 / 共 ${totalPages} 页</span>`;
        controls.innerHTML += `<button class="pagination-btn" onclick="loadPosts(${pageNo + 1})" ${response.last ? 'disabled' : ''}>下一页</button>`;
    }

    function performSearch() {
        const keywordInput = document.getElementById('searchKeyword').value;
        currentKeyword = keywordInput.trim();
        loadPosts(0);
    }

    document.getElementById('createPostForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const token = localStorage.getItem('blogToken');
        if (!token) {
            alert('请先登录才能发布文章！');
            return;
        }

        const title = document.getElementById('title').value;
        const body = document.getElementById('body').value;
        const authorStr = document.getElementById('author').value;
        const author = authorStr.replace("当前作者: ", ""); // 清理前缀

        if (!title || !body) {
            alert('标题和内容不能为空。');
            return;
        }

        const formData = { title, body, author };

        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(formData)
        })
            .then(async response => {
                if (checkTokenAndReload(response)) return;

                if (!response.ok) {
                    let errorMessage = await response.text();
                    throw new Error(`发布失败: ${response.status} - ${errorMessage}`);
                }
                return response.json();
            })
            .then(() => {
                alert('文章发布成功！');
                document.getElementById('createPostForm').reset();
                document.getElementById('bodyPreview').style.display = 'none';
                loadPosts(0);
            })
            .catch(error => {
                console.error('发布文章错误:', error);
                alert('文章发布失败: ' + error.message);
            });
    });

    function deletePost(postId, postTitle) {
        const token = localStorage.getItem('blogToken');
        if (!token) {
            alert('请先登录才能删除文章！');
            return;
        }

        if (confirm(`确定要删除文章: "${postTitle}" 吗？`)) {
            fetch(`${API_URL}/${postId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
                .then(async response => {
                    if (checkTokenAndReload(response)) return;

                    if (response.status === 204) {
                        alert('文章删除成功！');
                        loadPosts(currentPage);
                    } else if (response.status === 403) {
                        alert('删除失败: 您没有权限删除该文章。');
                    } else {
                        let errorMsg = await response.text();
                        throw new Error(errorMsg || `删除失败，状态码: ${response.status}`);
                    }
                })
                .catch(error => {
                    console.error('删除文章失败:', error);
                    alert('删除失败: ' + error.message);
                });
        }
    }

    function uploadMedia() {
        const token = localStorage.getItem('blogToken');
        if (!token) {
            alert('请先登录才能上传文件！');
            return;
        }

        const fileInput = document.getElementById('mediaFile');
        const file = fileInput.files[0];
        const statusDiv = document.getElementById('uploadStatus');

        if (!file) {
            statusDiv.textContent = '请选择一个文件。';
            return;
        }

        statusDiv.textContent = '⏳ 正在上传...';
        statusDiv.style.color = 'var(--text-light)';

        const formData = new FormData();
        formData.append('file', file);

        fetch(MEDIA_UPLOAD_URL, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
            .then(response => {
                if (checkTokenAndReload(response)) return;
                if (!response.ok) throw new Error('上传失败');
                return response.json();
            })
            .then(mediaResponse => {
                const mediaUrl = mediaResponse.fileDownloadUri;

                if (!mediaUrl) {
                    throw new Error("后端响应中缺少 fileDownloadUri 字段");
                }

                statusDiv.textContent = '✅ 上传成功！';
                statusDiv.style.color = 'var(--success)';

                const markdownLink = `![${file.name}](${mediaUrl})`;
                const bodyTextarea = document.getElementById('body');

                bodyTextarea.value += `\n${markdownLink}\n`;
                bodyTextarea.dispatchEvent(new Event('input'));

                fileInput.value = '';
            })
            .catch(error => {
                console.error('上传错误:', error);
                statusDiv.textContent = '❌ 上传失败: ' + error.message;
                statusDiv.style.color = 'var(--danger)';
            });
    }

    function renderSingleComment(comment, contentId, prepend = true) {
        const container = document.getElementById(`commentsContainer-${contentId}`);
        if (!container) return;

        if (container.children.length === 1 && container.children[0].tagName === 'P' && container.children[0].textContent.includes('还没有人评论')) {
            container.innerHTML = '';
        }

        if (!comment.id || !comment.author || !comment.body) {
            console.error("警告: 评论对象缺少关键字段 (id/author/body)。", comment);
            return;
        }

        const currentUsername = localStorage.getItem('blogUsername');
        const storedRolesJson = localStorage.getItem('blogRoles');
        let isAdmin = false;
        if (storedRolesJson) {
            try {
                const userRoles = JSON.parse(storedRolesJson);
                isAdmin = Array.isArray(userRoles) && userRoles.includes('ROLE_ADMIN');
            } catch (e) {
                console.error("解析用户角色 JSON 失败 (renderSingleComment):", e);
            }
        }

        const canEditOrDelete = currentUsername && (currentUsername === comment.author || isAdmin);
        const renderedCommentBody = marked.parse(comment.body || '');

        const commentDiv = document.createElement('div');
        commentDiv.className = 'comment-card';
        commentDiv.id = `comment-${comment.id}`;
        commentDiv.setAttribute('data-content-id', contentId);

        let actionButtons = '';
        if (canEditOrDelete) {
            actionButtons = `<div class="comment-actions" id="commentActions-${comment.id}">
                <button class="edit-btn" onclick="enableCommentEdit(${comment.id})">✏️ 编辑</button>
                <button class="delete-btn-comment" onclick="deleteCommentById(${contentId}, ${comment.id})">🗑️ 删除</button>
            </div>`;
        }

        commentDiv.innerHTML = `
            <div class="comment-meta">
                <span>${escapeHtml(comment.author)}</span>
                · ${new Date(comment.publishedAt).toLocaleString()}
            </div>
            <div class="comment-body" id="commentBodyDisplay-${comment.id}">${renderedCommentBody}</div>
            <textarea id="commentBodyEdit-${comment.id}"
                    style="display:none; width:100%; margin-top: 10px;"
                    rows="3">${escapeHtml(comment.body)}</textarea>
            ${actionButtons}
        `;

        if (prepend) {
            container.prepend(commentDiv);
        } else {
            container.appendChild(commentDiv);
        }
    }

    function loadComments(contentId) {
        const container = document.getElementById(`commentsContainer-${contentId}`);
        if (!container) return;

        container.innerHTML = '<div class="loading" style="font-size: 0.9em; padding: 10px;">正在加载评论...</div>';

        fetch(`${API_URL}/${contentId}/comments`)
            .then(response => {
                if (response.status === 401) {
                    container.innerHTML = '<p style="color: #f59e0b; font-size: 0.9em;">加载评论时认证失败，请检查登录状态。</p>';
                    return null;
                }
                if (!response.ok) throw new Error("加载评论失败");
                return response.json();
            })
            .then(comments => {
                if (comments === null) return;
                container.innerHTML = '';

                if (!Array.isArray(comments) || comments.length === 0) {
                    container.innerHTML = '<p style="font-size: 14px; color: var(--text-light); text-align: center; padding: 15px; background: #f8fafc; border-radius: 8px;">还没有人评论，快来抢沙发吧！</p>';
                    return;
                }

                comments.forEach(comment => renderSingleComment(comment, contentId, false));
            })
            .catch(error => {
                console.error("加载评论失败:", error);
                container.innerHTML = '<p style="color: var(--danger); font-size: 0.9em;">评论加载出错。</p>';
            });
    }

    function submitComment(contentId) {
        const token = localStorage.getItem('blogToken');
        if (!token) {
            alert('请先登录才能发表评论！');
            return;
        }

        const commentBodyInput = document.getElementById(`commentBody-${contentId}`);
        const body = commentBodyInput.value.trim();
        if (!body) {
            alert('评论内容不能为空。');
            return;
        }

        const formData = { body: body };

        fetch(`${API_URL}/${contentId}/comments`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(formData)
        })
            .then(async response => {
                if (checkTokenAndReload(response)) return;
                if (response.ok) return response.json();

                let errorMessage = `发表评论失败，状态码: ${response.status}`;
                try {
                    const errorJson = await response.json();
                    errorMessage = errorJson.message || errorJson.error || errorMessage;
                } catch (e) {
                    errorMessage = await response.text() || errorMessage;
                }
                throw new Error(errorMessage);
            })
            .then((newComment) => {
                if (!newComment || !newComment.id) throw new Error("后端返回的数据无效");

                commentBodyInput.value = '';
                renderSingleComment(newComment, contentId, true);
                refreshPostCommentCount(contentId);
            })
            .catch(error => {
                console.error('发表评论错误:', error);
                alert('发表评论失败: ' + error.message);
            });
    }

    function enableCommentEdit(commentId) {
        document.getElementById(`commentBodyDisplay-${commentId}`).style.display = 'none';
        document.getElementById(`commentBodyEdit-${commentId}`).style.display = 'block';

        document.getElementById(`commentActions-${commentId}`).innerHTML = `
            <button class="save-btn" onclick="saveCommentEdit(${commentId})">✅ 保存</button>
            <button class="cancel-btn" onclick="cancelCommentEdit(${commentId})">✖️ 取消</button>
        `;
    }

    function cancelCommentEdit(commentId) {
        document.getElementById(`commentBodyDisplay-${commentId}`).style.display = 'block';
        document.getElementById(`commentBodyEdit-${commentId}`).style.display = 'none';

        document.getElementById(`commentActions-${commentId}`).innerHTML = `
            <button class="edit-btn" onclick="enableCommentEdit(${commentId})">✏️ 编辑</button>
            <button class="delete-btn-comment" onclick="deleteCommentById(document.getElementById('comment-${commentId}').getAttribute('data-content-id'), ${commentId})">🗑️ 删除</button>
        `;
    }

    function saveCommentEdit(commentId) {
        const token = localStorage.getItem('blogToken');
        if (!token) return alert('请先登录才能编辑评论！');

        const editArea = document.getElementById(`commentBodyEdit-${commentId}`);
        const newBody = editArea.value.trim();
        if (!newBody) return alert('评论内容不能为空。');

        const contentId = document.getElementById(`comment-${commentId}`)?.getAttribute('data-content-id');
        if (!contentId) return alert('编辑失败：无法确定评论所属的文章ID。');

        fetch(`${API_URL}/${contentId}/comments/${commentId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ body: newBody })
        })
            .then(async response => {
                if (checkTokenAndReload(response)) return;
                if (response.status === 403) throw new Error("您无权编辑该评论！");
                if (!response.ok) {
                    let errorMessage = await response.text();
                    throw new Error(errorMessage || `编辑失败: ${response.status}`);
                }
                return response.json();
            })
            .then(() => {
                loadComments(parseInt(contentId));
                refreshPostCommentCount(contentId);
            })
            .catch(error => {
                console.error('保存编辑失败:', error);
                alert('保存编辑失败: ' + error.message);
            });
    }

    function deleteCommentById(contentId, commentId) {
        const token = localStorage.getItem('blogToken');
        if (!token) return alert('请先登录才能删除评论！');

        if (confirm("确定要删除这条评论吗？")) {
            fetch(`${API_URL}/${contentId}/comments/${commentId}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(async response => {
                    if (checkTokenAndReload(response)) return;
                    if (response.status === 204) {
                        document.getElementById(`comment-${commentId}`)?.remove();
                        refreshPostCommentCount(contentId);
                    } else if (response.status === 403) {
                        alert('删除失败: 您没有权限删除该评论。');
                    } else {
                        throw new Error(await response.text() || `删除失败: ${response.status}`);
                    }
                })
                .catch(error => alert('删除评论失败: ' + error.message));
        }
    }

    async function refreshPostCommentCount(contentId) {
        try {
            const response = await fetch(`${API_URL}/${contentId}`, {
                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('blogToken') || '') }
            });
            if (!response.ok) return;
            const post = await response.json();

            let countElement = document.getElementById(`commentCountDisplay-${contentId}`);
            if (countElement) {
                countElement.textContent = `💬 评论 (${post.commentCount || 0})`;
            }
        } catch (error) {
            console.error(`更新文章 ${contentId} 评论计数失败:`, error);
        }
    }

    const bodyArea = document.getElementById('body');
    bodyArea.addEventListener('input', () => {
        const previewDiv = document.getElementById('bodyPreview');
        const previewContent = document.getElementById('previewContent');
        if (bodyArea.value.trim()) {
            previewDiv.style.display = 'block';
            previewContent.innerHTML = marked.parse(bodyArea.value);
        } else {
            previewDiv.style.display = 'none';
        }
    });
</script>

</body>
</html>
